backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "assets/img"

collections:
  - name: "pages"
    label: "Páginas"
    files:
      - file: "index.njk"
        label: "Página Inicial"
        name: "home"
        fields:
          - {label: "Título Principal", name: "title", widget: "string", required: false}
          - {label: "Subtítulo (Legenda)", name: "tagline", widget: "string", required: false}
          - {label: "Caminho Banner", name: "banner_image", widget: "string", required: false}
          - {label: "Caminho Mascote", name: "mascot_image", widget: "string", required: false}
          - {label: "Nome do Professor", name: "teacher_name", widget: "string", required: false}
          - {label: "Escola", name: "school_name", widget: "string", required: false}
          - {label: "Disciplina", name: "subject_name", widget: "string", required: false}
          - {label: "Caminho Foto Prof", name: "card1_image", widget: "string", required: false}
          - {label: "Caminho Foto Soc", name: "card2_image", widget: "string", required: false}
          - {label: "Caminho Foto Temas", name: "card3_image", widget: "string", required: false}
          - {label: "Caminho Foto Proj", name: "card4_image", widget: "string", required: false}